<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Guru - SIGURU-SD BADUNG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header p-3 text-center">
            <i class="bi bi-mortarboard-fill fs-2 text-white"></i>
            <h6 class="text-white fw-bold mt-2 mb-0">SIGURU-SD BADUNG</h6>
            <small class="text-white-50">Data Guru</small>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link-sidebar"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
            <a href="sekolah.html" class="nav-link-sidebar"><i class="bi bi-building me-2"></i>Data Sekolah</a>
            <a href="guru.html" class="nav-link-sidebar active"><i class="bi bi-person-check me-2"></i>Data Guru</a>
            <a href="kebutuhan.html" class="nav-link-sidebar"><i class="bi bi-calculator me-2"></i>Kebutuhan Guru</a>
            <a href="laporan.html" class="nav-link-sidebar"><i class="bi bi-exclamation-triangle me-2"></i>Laporan Kekurangan</a>
            <a href="distribusi.html" class="nav-link-sidebar"><i class="bi bi-arrow-left-right me-2"></i>Distribusi Guru</a>
            <a href="peta.html" class="nav-link-sidebar"><i class="bi bi-geo-alt me-2"></i>Peta Sebaran</a>
            <a href="pimpinan.html" class="nav-link-sidebar"><i class="bi bi-bar-chart-line me-2"></i>Dashboard Pimpinan</a>
            <hr class="text-white-50 mx-3">
            <a href="login.html" class="nav-link-sidebar text-danger" onclick="sessionStorage.clear()"><i class="bi bi-box-arrow-right me-2"></i>Keluar</a>
        </nav>
    </div>

    <div class="main-content">
        <nav class="navbar top-navbar shadow-sm px-4">
            <button class="btn btn-sm btn-outline-secondary d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <h5 class="mb-0 fw-bold text-navy">Data Guru & Tenaga Pendidik</h5>
            <button class="btn btn-navy btn-sm rounded-pill" data-bs-toggle="modal" data-bs-target="#modalTambah">
                <i class="bi bi-plus-circle me-1"></i>Tambah Guru
            </button>
        </nav>

        <div class="content-area p-4">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label small fw-semibold">Sekolah</label>
                            <select class="form-select form-select-sm" id="filterSekolah">
                                <option value="">Semua Sekolah</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-semibold">Mata Pelajaran</label>
                            <select class="form-select form-select-sm" id="filterMapel">
                                <option value="">Semua Mapel</option>
                                <option>Kelas 1</option><option>Kelas 2</option>
                                <option>Kelas 3</option><option>Kelas 4</option>
                                <option>Kelas 5</option><option>Kelas 6</option>
                                <option>PJOK</option><option>Bahasa Inggris</option>
                                <option>Seni Budaya</option><option>Agama</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-semibold">Status Kepegawaian</label>
                            <select class="form-select form-select-sm" id="filterStatus">
                                <option value="">Semua</option>
                                <option>PNS</option><option>PPPK</option><option>Honorer</option>
                            </select>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button class="btn btn-navy btn-sm w-100" onclick="loadGuru()">
                                <i class="bi bi-search me-1"></i>Cari
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="bg-navy text-white">
                                <tr>
                                    <th>No</th><th>Nama Guru</th><th>NIP</th>
                                    <th>Sekolah</th><th>Mapel</th><th>Status</th>
                                    <th>Pendidikan</th><th>Masa Kerja</th>
                                </tr>
                            </thead>
                            <tbody id="tbodyGuru">
                                <tr><td colspan="8" class="text-center py-4">Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white">
                    <small class="text-muted" id="infoData">Menampilkan 0 data</small>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalTambah" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-navy text-white">
                    <h5 class="modal-title"><i class="bi bi-person-plus me-2"></i>Tambah Data Guru</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formGuru">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Sekolah *</label>
                                <select class="form-select" name="sekolah_id" required>
                                    <option value="">Pilih Sekolah</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nama Guru *</label>
                                <input type="text" class="form-control" name="nama_guru" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">NIP</label>
                                <input type="text" class="form-control" name="nip">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Mata Pelajaran *</label>
                                <select class="form-select" name="mata_pelajaran" required>
                                    <option>Kelas 1</option><option>Kelas 2</option>
                                    <option>Kelas 3</option><option>Kelas 4</option>
                                    <option>Kelas 5</option><option>Kelas 6</option>
                                    <option>PJOK</option><option>Bahasa Inggris</option>
                                    <option>Seni Budaya</option><option>Agama</option>
                                    <option>IPA</option><option>Matematika</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Tempat Lahir</label>
                                <input type="text" class="form-control" name="tempat_lahir">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Tanggal Lahir</label>
                                <input type="date" class="form-control" name="tanggal_lahir">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Jenis Kelamin</label>
                                <select class="form-select" name="jenis_kelamin">
                                    <option>Laki-laki</option><option>Perempuan</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Status Kepegawaian</label>
                                <select class="form-select" name="status_kepegawaian">
                                    <option>PNS</option><option>PPPK</option><option>Honorer</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Pendidikan Terakhir</label>
                                <select class="form-select" name="pendidikan_terakhir">
                                    <option>SMA</option><option>D2</option><option>S1</option>
                                    <option>S2</option><option>S3</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Masa Kerja (Tahun)</label>
                                <input type="number" class="form-control" name="masa_kerja">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-navy" onclick="submitGuru()">
                        <i class="bi bi-save me-1"></i>SIMPAN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/helper.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadDropdownSekolah();
            loadGuru();
        });

        async function loadDropdownSekolah() {
            const result = await getSekolah();
            if (result && result.success) {
                const options = result.data.map(s => 
                    `<option value="${s.id}" data-nama="${s.nama_sekolah}">${s.nama_sekolah} (${s.npsn})</option>`
                ).join('');
                document.querySelectorAll('select[name="sekolah_id"]').forEach(el => {
                    el.innerHTML = '<option value="">Pilih Sekolah</option>' + options;
                });
                document.getElementById('filterSekolah').innerHTML = '<option value="">Semua Sekolah</option>' + options;
            }
        }

        async function loadGuru() {
            showLoading('Memuat data...');
            const filters = {};
            const sekolah = document.getElementById('filterSekolah').value;
            const mapel = document.getElementById('filterMapel').value;
            const status = document.getElementById('filterStatus').value;
            if (sekolah) filters.sekolah_id = sekolah;
            if (mapel) filters.mata_pelajaran = mapel;
            if (status) filters.status_kepegawaian = status;
            
            const result = await getGuru(filters);
            hideLoading();
            
            if (result && result.success) {
                renderGuru(result.data);
            }
        }

        function renderGuru(data) {
            const tbody = document.getElementById('tbodyGuru');
            const info = document.getElementById('infoData');
            
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">Belum ada data</td></tr>';
                info.textContent = 'Menampilkan 0 data';
                return;
            }

            tbody.innerHTML = data.map((r, i) => {
                let badgeStatus = 'bg-success';
                if (r.status_kepegawaian === 'PPPK') badgeStatus = 'bg-primary';
                else if (r.status_kepegawaian === 'Honorer') badgeStatus = 'bg-warning text-dark';
                
                return `<tr>
                    <td>${i+1}</td>
                    <td><strong>${r.nama_guru || '-'}</strong></td>
                    <td>${r.nip || '-'}</td>
                    <td>${r.nama_sekolah || '-'}</td>
                    <td>${r.mata_pelajaran || '-'}</td>
                    <td><span class="badge ${badgeStatus}">${r.status_kepegawaian || '-'}</span></td>
                    <td>${r.pendidikan_terakhir || '-'}</td>
                    <td>${r.masa_kerja || 0} th</td>
                </tr>`;
            }).join('');
            
            info.textContent = `Menampilkan ${data.length} guru`;
        }

        async function submitGuru() {
            const form = document.getElementById('formGuru');
            const data = Object.fromEntries(new FormData(form).entries());

            if (!data.sekolah_id || !data.nama_guru) {
                showNotif('Sekolah dan Nama Guru wajib diisi!', 'danger');
                return;
            }

            const selectSekolah = form.querySelector('select[name="sekolah_id"]');
            data.nama_sekolah = selectSekolah.options[selectSekolah.selectedIndex].dataset.nama || '';

            showLoading('Menyimpan...');
            const result = await saveGuru(data);
            hideLoading();

            if (result && result.success) {
                showNotif('✅ Guru berhasil ditambahkan! Email notifikasi telah dikirim.', 'success');
                bootstrap.Modal.getInstance(document.getElementById('modalTambah')).hide();
                form.reset();
                loadGuru();
            } else {
                showNotif('❌ Gagal: ' + (result?.message || 'Unknown error'), 'danger');
            }
        }
    </script>
</body>
</html>
