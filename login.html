<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIGURU-SD BADUNG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-login">
    <div class="container" style="max-width: 450px;">
        <div class="card shadow-lg p-4 login-card">
            <div class="text-center mb-4">
                <div class="login-icon">
                    <i class="bi bi-mortarboard-fill"></i>
                </div>
                <h3 class="fw-bold text-navy">SIGAP PENDIDIKAN SD</h3>
                <p class="text-muted small">Sistem Informasi Guru SD</p>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" class="form-control form-control-lg" id="username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" class="form-control form-control-lg" id="password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Login Sebagai</label>
                    <select class="form-select form-select-lg" id="role">
                        <option value="admin">Administrator</option>
                        <option value="kepsek">Kepala Sekolah</option>
                        <option value="pimpinan">Pimpinan</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-navy btn-lg w-100 rounded-pill mt-3">LOGIN</button>
            </form>
        </div>
    </div>

    <script src="assets/js/helper.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            showLoading('Memverifikasi...');
            const result = await login(username, password, role);
            hideLoading();
            
            if (result && result.success) {
                sessionStorage.setItem('userRole', result.data.role);
                sessionStorage.setItem('userName', result.data.nama_lengkap);
                showNotif('Login berhasil!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } else {
                showNotif(result?.message || 'Login gagal', 'danger');
            }
        });
    </script>
</body>
</html>
